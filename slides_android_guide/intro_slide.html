<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
      html, body { height: 100%; margin: 0; }
      .slide-container {
        width: 1280px;
        min-height: 720px;
        display: flex;
        background-color: #FFFFFF;
        font-family: 'Montserrat', sans-serif;
        color: #1E3A8A;
        overflow: hidden;
      }
      .main-content {
        flex: 2;
        padding-top: 100px; /* keep upper padding of title */
        padding-left: 80px;
        background-color: #E0F2FE;
        position: relative;
      }
      .side-accent {
        flex: 1;
        background-color: #1E3A8A;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .title {
        font-family: 'Playfair Display', serif;
        font-size: 72px;
        font-weight: 900;
        line-height: 1.1;
        margin-top: 0; /* remove default h1 top margin to reduce total height */
        margin-bottom: 40px;
        color: #1E3A8A;
      }
      .subtitle {
        font-size: 32px;
        font-weight: 700;
        color: #D97706;
        margin-bottom: 60px;
        max-width: 700px;
      }
      .points-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .point-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 25px;
        font-size: 20px;
        color: #1E3A8A;
      }
      .point-icon {
        color: #D97706;
        margin-right: 15px;
        margin-top: 5px;
      }
      .map-path {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0.2;
        pointer-events: none;
      }
      .circle-mask {
        width: 250px;
        height: 250px;
        background-color: #D97706;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      }
      .circle-mask i { font-size: 120px; color: #FFFFFF; }
      .dotted-line {
        position: absolute;
        border-left: 4px dotted #D97706;
        height: 400px;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        z-index: 0;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="main-content">
            <h1 class="title">Fast English<br>para Android</h1>
            <p class="subtitle">Transformando el Aprendizaje de Inglés en una Experiencia Móvil</p>
            <ul class="points-list">
                <li class="point-item">
                    <i class="fas fa-rocket point-icon"></i>
                    <span>Evolución estratégica de plataforma web a aplicación nativa.</span>
                </li>
                <li class="point-item">
                    <i class="fas fa-user-check point-icon"></i>
                    <span>Maximización de la retención mediante gamificación móvil.</span>
                </li>
                <li class="point-item">
                    <i class="fas fa-map-marked-alt point-icon"></i>
                    <span>Hoja de ruta técnica para un despliegue exitoso.</span>
                </li>
            </ul>
        </div>
        <div class="side-accent">
            <div class="dotted-line"></div>
            <div class="circle-mask">
                <i class="fas fa-mobile-alt"></i>
            </div>
        </div>
    </div>
</body>
</html>
